; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; =============================================================
; M.I.N.D. Companion — PlatformIO Configuration
; Board: Freenove ESP32-S3-WROOM-1-N8R8 CAM
;        8 MB Flash (QIO) + 8 MB PSRAM (OPI) + built-in OV2640
; =============================================================

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
monitor_speed = 115200

; Board definition already sets:
;   memory_type = qio_opi, BOARD_HAS_PSRAM, USB_CDC_ON_BOOT=0,
;   flash_size = 8MB, psram_type = opi

; Extra build flag for PSRAM cache fix
build_flags =
    -mfix-esp32-psram-cache-issue

; Use LittleFS for serving dashboard.html
board_build.filesystem = littlefs

; Larger app partition for camera + all libraries
board_build.partitions = huge_app.csv

; Source files are in src/ and its subdirectories
build_src_filter = +<*> +<**/*.cpp>

lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    adafruit/Adafruit MPU6050@^2.2.9
    adafruit/Adafruit ILI9341@^1.6.3
    adafruit/RTClib@^2.1.4
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
    espressif/esp32-camera@^2.0.4
    esp32async/ESPAsyncWebServer@^3.10.0
    esp32async/AsyncTCP@^3.4.10
