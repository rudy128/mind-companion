# =============================================================
# M.I.N.D. Companion — Mosquitto Broker Config
# =============================================================
# Place this file at: C:\Program Files\Mosquitto\mind.conf
# Run with:  mosquitto -v -c "C:\Program Files\Mosquitto\mind.conf"
# =============================================================

# ── Allow connections from any device (ESP32 on LAN) ──
allow_anonymous true

# ── Listener 1: Raw MQTT on port 1883 (for ESP32) ──
listener 1883 0.0.0.0
protocol mqtt

# ── Listener 2: WebSockets on port 9001 (for browser dashboard) ──
listener 9001 0.0.0.0
protocol websockets

# ── Logging ──
log_type all
